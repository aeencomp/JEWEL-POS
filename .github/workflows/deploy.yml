# Deploy to VPS from GitHub (push to main or manual Run workflow).
# Secrets: VPS_HOST, VPS_USER, VPS_SSH_KEY, VPS_APP_PATH, DATABASE_URL, SESSION_SECRET
# Optional: GITHUB_DEPLOY_TOKEN, RESEND_API_KEY, RESEND_FROM_EMAIL

name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload deploy script
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "deploy/remote-bootstrap.sh"
          target: "/tmp"
          strip_components: 1

      - name: Run deploy on VPS
        env:
          APP_PATH: ${{ secrets.VPS_APP_PATH }}
          REPO_URL: https://github.com/aeencomp/JEWEL-POS.git
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          GITHUB_DEPLOY_TOKEN: ${{ secrets.GITHUB_DEPLOY_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          envs: APP_PATH,REPO_URL,DATABASE_URL,SESSION_SECRET,GITHUB_DEPLOY_TOKEN,RESEND_API_KEY,RESEND_FROM_EMAIL
          script: |
            export APP_PATH="${APP_PATH:-/var/www/jewel-pos}"
            SCRIPT=""
            for candidate in /tmp/remote-bootstrap.sh /tmp/deploy/remote-bootstrap.sh; do
              if [ -f "$candidate" ]; then
                SCRIPT="$candidate"
                break
              fi
            done
            if [ -z "$SCRIPT" ]; then
              echo "Bootstrap script not found in /tmp:"
              ls -la /tmp/
              exit 1
            fi
            bash "$SCRIPT"
