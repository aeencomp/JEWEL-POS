# Example Nginx site — replace YOUR_DOMAIN and app port if needed.
# Install: sudo cp deploy/nginx.example.conf /etc/nginx/sites-available/jewel-pos
#          sudo ln -s /etc/nginx/sites-available/jewel-pos /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
# SSL:     sudo certbot --nginx -d YOUR_DOMAIN

server {
    listen 80;
    server_name YOUR_DOMAIN;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
