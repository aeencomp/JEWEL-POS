<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#b45309" />
    <title>IQ Order</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0f172a;
        color: #f8fafc;
        font-family: system-ui, sans-serif;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(251, 191, 36, 0.25);
        border-top-color: #fbbf24;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="spinner" aria-label="Loading IQ Order"></div>
    <script>
      // Fallback when not using server.url (local dev). Production uses capacitor.config server.url.
      if (!window.Capacitor) {
        window.location.replace("https://iq-pos.com/app");
      }
    </script>
  </body>
</html>
